name: Build APK & Upload Release Asset

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: flutter pub get

      - name: Clean and Build APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: Rename APK for easier identification
        run: |
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/myapp-release.apk

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest APK Build
          body: |
            Automated APK build from GitHub Actions
            Built on: ${{ github.event.head_commit.timestamp }}
          files: apk/myapp-release.apk
          prerelease: false
          make_latest: true
          overwrite: true
